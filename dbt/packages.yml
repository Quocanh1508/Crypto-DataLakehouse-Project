# =============================================================================
# packages.yml
# =============================================================================
# Khai báo các thư viện (packages) bên ngoài mà dbt project này dùng.
#
# Sau khi chỉnh file này, chạy: dbt deps
# dbt sẽ tải packages vào thư mục dbt_packages/ (đã được gitignore).
#
# Package dbt-labs/dbt_utils cung cấp:
#   - dbt_utils.not_empty_string : test cột không được là chuỗi rỗng ""
#   - dbt_utils.unique_combination_of_columns : test composite unique key
#   - dbt_utils.expression_is_true : test một biểu thức SQL phải true
#   - Nhiều macro tiện ích khác (generate_surrogate_key, star, ...)
#
# Tại sao dùng dbt_utils thay vì tự viết?
#   -> Tiết kiệm thời gian, test đã được cộng đồng verify, maintained.
# =============================================================================

packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.0.0", "<2.0.0"]   # Tương thích với dbt-core 1.x
