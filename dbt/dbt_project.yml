# =============================================================================
# dbt_project.yml
# =============================================================================
# Đây là file cấu hình TRUNG TÂM của toàn bộ dbt project.
#
# dbt đọc file này đầu tiên mỗi khi bạn chạy bất kỳ lệnh nào (dbt run,
# dbt test, dbt docs...).
#
# Các quyết định thiết kế:
#   - staging/ -> materialized: view
#       View không ghi data ra storage, chỉ là "alias" cho 1 câu SQL.
#       Lý do: staging chỉ là bước làm sạch trung gian, không cần persist.
#
#   - marts/   -> materialized: table
#       Table ghi kết quả thật vào Trino/Delta theo format Parquet.
#       Lý do: Power BI kết nối bảng này, cần query nhanh, không recompute.
#
# Profile 'crypto_lakehouse' phải tồn tại trong ~/.dbt/profiles.yml
# (xem profiles_template.yml trong thư mục này để biết cách tạo)
# =============================================================================

name: 'crypto_lakehouse'
version: '1.0.0'
config-version: 2

# Kết nối với profile trong ~/.dbt/profiles.yml
profile: 'crypto_lakehouse'

# Đường dẫn thư mục (relative từ thư mục dbt/)
model-paths: ["models"]
test-paths:  ["tests"]
seed-paths:  ["seeds"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

# Thư mục output (dbt tạo tự động, đã được .gitignore)
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Cấu hình materialization theo từng nhóm models
# =============================================================================
models:
  crypto_lakehouse:

    staging:
      # staging = SQL view trên Trino, không tốn storage
      +materialized: view
      +schema: staging          # Tạo view trong schema 'staging'

    marts:
      # marts = Trino table thật, Power BI đọc trực tiếp từ đây
      +materialized: table
      +schema: marts            # Tạo table trong schema 'marts'
