version: 2

# =============================================================================
# models/staging/schema.yml
# =============================================================================
# Tests and documentation for the stg_gold_ohlcv staging model.
#
# Columns tested here match the OUTPUT of stg_gold_ohlcv.sql,
# which transforms the raw Gold table columns into analysis-ready format.
# =============================================================================

models:
  - name: stg_gold_ohlcv
    description: >
      Staging view on top of Gold OHLCV table (delta.default.gold_ohlcv).
      Standardizes data types (cast to DOUBLE), derives helper columns
      (candle_range, typical_price, window_end, window_minutes),
      and filters out future timestamps. This is a VIEW on Trino.

    columns:

      - name: symbol
        description: "Binance USDT trading pair, e.g. BTCUSDT, ETHUSDT."
        tests:
          - not_null
          - dbt_utils.not_empty_string

      - name: candle_time
        description: "Start timestamp of the candle window (UTC)."
        tests:
          - not_null

      - name: candle_duration
        description: "Original duration string from Gold: '1 minute' or '5 minutes'."
        tests:
          - not_null
          - accepted_values:
              values: ["1 minute", "5 minutes"]

      - name: window_minutes
        description: "Integer minutes derived from candle_duration: 1 or 5."
        tests:
          - not_null
          - accepted_values:
              values: [1, 5]
              quote: false

      - name: open
        description: "Opening price of the candle (cast to DOUBLE)."
        tests:
          - not_null

      - name: high
        description: "Highest price in the candle (cast to DOUBLE)."
        tests:
          - not_null
          # Custom generic test: high MUST >= low, no exceptions
          - assert_high_gte_low:
              column_high: high
              column_low: low

      - name: low
        description: "Lowest price in the candle (cast to DOUBLE)."
        tests:
          - not_null

      - name: close
        description: "Closing price of the candle (cast to DOUBLE)."
        tests:
          - not_null

      - name: volume
        description: "Total quantity traded in the candle (cast to DOUBLE)."
        tests:
          - not_null

      - name: tick_count
        description: "Number of individual trades in this candle. May be NULL if Gold did not compute."

      - name: candle_range
        description: >
          Price range = high - low. Always >= 0.
          Computed in staging for reuse in mart without recomputing.

      - name: typical_price
        description: >
          (high + low + close) / 3. Used to compute VWAP in mart layer.

      - name: window_end
        description: "End timestamp of candle = candle_time + duration."

      - name: trade_date
        description: >
          DATE from candle_date (Gold partition column).
          Used for partition pruning when Power BI filters by date.

      - name: ma_7
        description: "Moving Average 7 periods (from Gold). NULL for first 6 candles."

      - name: ma_20
        description: "Moving Average 20 periods (from Gold). NULL for first 19 candles."

      - name: ma_50
        description: "Moving Average 50 periods (from Gold). NULL for first 49 candles."

      - name: processing_timestamp
        description: "ISO 8601 timestamp of when the Gold batch job ran."
