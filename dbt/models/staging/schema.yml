version: 2

# =============================================================================
# models/staging/schema.yml
# =============================================================================
# File này khai báo metadata và tests cho các staging models.
#
# Tại sao cần schema.yml cho staging?
#   1. dbt đọc file này để tự động generate SQL tests
#   2. dbt docs hiển thị description của từng cột (documentation tự động)
#   3. Central place để quản lý chất lượng dữ liệu theo từng cột
#
# Convention dbt tests:
#   - not_null          : cột không được có giá trị NULL
#   - unique            : mỗi giá trị phải xuất hiện đúng 1 lần
#   - accepted_values   : cột chỉ chứa các giá trị trong danh sách cho trước
#   - relationships     : foreign key constraint
#   - assert_high_gte_low : custom generic test (tự viết trong tests/generic/)
#
# Convention dbt: test PASS = query trả về 0 rows
#                 test FAIL = query trả về > 0 rows
# =============================================================================

models:
  - name: stg_gold_ohlcv
    description: >
      Staging view: Đọc trực tiếp từ Gold OHLCV table (delta.default.gold_ohlcv),
      chuẩn hoá kiểu dữ liệu (cast Decimal -> Double), thêm các cột phụ trợ
      (candle_range, typical_price, window_end, trade_date), và lọc bỏ các row
      có timestamp trong tương lai.
      Đây là VIEW trên Trino, không ghi data ra storage.

    columns:

      - name: symbol
        description: "Cặp giao dịch Binance USDT, ví dụ BTCUSDT, ETHUSDT."
        tests:
          - not_null
          - dbt_utils.not_empty_string   # Không cho phép symbol = ""

      - name: window_start
        description: "Thời điểm bắt đầu của nến (UTC timestamp)."
        tests:
          - not_null

      - name: window_minutes
        description: "Độ dài nến: 1 hoặc 5 phút."
        tests:
          - not_null
          - accepted_values:
              values: [1, 5]   # Chỉ cho phép 2 giá trị này

      - name: open
        description: "Giá mở cửa của nến (đã cast sang DOUBLE)."
        tests:
          - not_null

      - name: high
        description: "Giá cao nhất trong nến (đã cast sang DOUBLE)."
        tests:
          - not_null
          # Custom generic test: high PHẢI >= low, không ngoại lệ
          # Test fail nghĩa là Gold layer tính toán sai aggregate
          - assert_high_gte_low:
              column_high: high
              column_low: low

      - name: low
        description: "Giá thấp nhất trong nến (đã cast sang DOUBLE)."
        tests:
          - not_null

      - name: close
        description: "Giá đóng cửa của nến (đã cast sang DOUBLE)."
        tests:
          - not_null

      - name: volume
        description: "Tổng khối lượng giao dịch trong nến (đã cast sang DOUBLE)."
        tests:
          - not_null

      - name: trade_count
        description: "Số giao dịch tick tạo nên nến. Cho phép NULL nếu Gold không tính."

      - name: candle_range
        description: >
          Biên độ dao động = high - low. Luôn >= 0.
          Tính tại staging để tái sử dụng ở mart mà không compute lại.

      - name: typical_price
        description: >
          (high + low + close) / 3. Dùng để tính VWAP tại mart layer.

      - name: window_end
        description: "Timestamp kết thúc nến = window_start + window_minutes."

      - name: trade_date
        description: >
          DATE của window_start. Dùng cho partition pruning khi Power BI
          filter theo ngày (WHERE trade_date = ...).
