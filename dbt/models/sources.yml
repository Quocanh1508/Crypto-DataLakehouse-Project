version: 2

# =============================================================================
# sources.yml
# =============================================================================
# "Source" trong dbt là cách khai báo bảng KHÔNG do bạn tự tạo —
# nó đến từ hệ thống upstream (ở đây là Gold layer của Teammate 1).
#
# Tại sao cần khai báo source thay vì hardcode tên bảng trong SQL?
#   1. dbt tự tạo lineage graph: biết models nào phụ thuộc vào bảng nào
#   2. Có thể test trực tiếp trên source (not_null, accepted_values...)
#   3. Khi bảng thay tên/dời schema, chỉ sửa 1 nơi duy nhất ở đây
#   4. dbt docs generate hiển thị description của từng cột
#
# Cách dùng trong SQL model:
#   {{ source('gold', 'gold_ohlcv') }}
#   -> dbt tự resolve thành: delta.default.gold_ohlcv
#
# Mapping:
#   source name 'gold'   -> database=delta, schema=default trong profiles.yml
#   table name 'gold_ohlcv' -> tên bảng thật trong Trino
# =============================================================================

sources:
  - name: gold
    database: delta          # Tên catalog Trino (delta.properties)
    schema: default          # Schema trong Delta catalog (Hive Metastore)
    description: >
      Gold layer OHLCV aggregates được tạo bởi Teammate 1 (silver_to_gold.py).
      Chứa nến giá 1-phút và 5-phút cho Top-50 Binance USDT pairs.
      Được ghi vào Google Cloud Storage tại gs://crypto-lakehouse-group8/gold/
      dưới dạng Delta Lake format, đọc qua Trino catalog 'delta'.

    # Freshness check: cảnh báo nếu data Gold quá cũ (Airflow chưa chạy)
    freshness:
      warn_after:  {count: 1, period: hour}    # cảnh báo sau 1 giờ không có data mới
      error_after: {count: 3, period: hour}    # lỗi sau 3 giờ không có data mới
    loaded_at_field: window_start              # dbt dùng cột này để tính freshness

    tables:
      - name: gold_ohlcv
        description: >
          Bảng OHLCV (Open/High/Low/Close/Volume) được aggregate từ Silver trades.
          Mỗi row là 1 nến giá cho 1 symbol trong 1 khoảng thời gian (1 phút hoặc 5 phút).
          Bảng được partition by (symbol, window_minutes, dt) để Trino prune partitions
          khi query theo symbol + ngày, tránh full scan.

        columns:
          - name: symbol
            description: >
              Cặp giao dịch Binance, ví dụ BTCUSDT, ETHUSDT, BNBUSDT.
              Luôn là chữ HOA. Chỉ bao gồm các pair kết thúc bằng USDT.
            tests:
              - not_null
              - dbt_utils.not_empty_string

          - name: window_start
            description: >
              Timestamp UTC bắt đầu của nến giá.
              Ví dụ: nến 1-phút bắt đầu lúc 10:05:00 UTC.
            tests:
              - not_null

          - name: window_minutes
            description: >
              Độ dài của nến tính bằng phút. Chỉ có 2 giá trị hợp lệ: 1 hoặc 5.
              Giá trị 1 = nến 1 phút (high frequency).
              Giá trị 5 = nến 5 phút (trend overview).
            tests:
              - not_null
              - accepted_values:
                  values: [1, 5]

          - name: open
            description: "Giá giao dịch ĐẦUT TIÊN trong khoảng thời gian của nến."
            tests:
              - not_null

          - name: high
            description: "Giá giao dịch CAO NHẤT trong khoảng thời gian của nến."
            tests:
              - not_null

          - name: low
            description: "Giá giao dịch THẤP NHẤT trong khoảng thời gian của nến."
            tests:
              - not_null

          - name: close
            description: "Giá giao dịch CUỐI CÙNG trong khoảng thời gian của nến."
            tests:
              - not_null

          - name: volume
            description: >
              Tổng khối lượng giao dịch (tính bằng đơn vị coin, không phải USDT).
              Ví dụ: 1.234 BTC được giao dịch trong nến này.
            tests:
              - not_null

          - name: trade_count
            description: "Số lượng tick giao dịch riêng lẻ tạo nên nến này."

          - name: sma_5
            description: >
              Simple Moving Average 5 kỳ của giá close.
              Tính tại lớp Gold bằng window function.
              Null cho 4 nến đầu tiên của mỗi symbol (chưa đủ lịch sử).

          - name: sma_20
            description: >
              Simple Moving Average 20 kỳ của giá close.
              Null cho 19 nến đầu tiên của mỗi symbol.
