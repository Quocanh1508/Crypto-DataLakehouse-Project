version: 2

# =============================================================================
# sources.yml
# =============================================================================
# Khai bao source cho Gold OHLCV table tu silver_to_gold.py (Teammate 1).
#
# Schema mapping (tu silver_to_gold.py):
#   silver_to_gold.py output -> Trino column -> dbt source column
#   symbol                  -> symbol        -> symbol
#   candle_time             -> candle_time    -> candle_time
#   candle_date             -> candle_date    -> candle_date    (partition)
#   candle_duration         -> candle_duration-> candle_duration ("1 minute"/"5 minutes")
#   open/high/low/close     -> same           -> same
#   volume                  -> volume         -> volume
#   tick_count              -> tick_count     -> tick_count
#   ma_7/ma_20/ma_50        -> same           -> same (Moving Averages)
#   processing_timestamp    -> same           -> same
#
# Storage: gs://crypto-lakehouse-group8/gold (Delta Lake on GCS)
# Partitioned by: (symbol, candle_date)
# =============================================================================

sources:
  # =============================================================================
  # SOURCE 1: Local mock data (MinIO / local dev)
  # Trino catalog: delta  →  delta.default.gold_ohlcv
  # Data: 22 mock rows inserted by setup_and_test.ps1 STEP 6
  # Use: dbt run / dbt test (local dev, no GCS credentials needed)
  # =============================================================================
  - name: gold
    database: delta          # Trino catalog name (delta.properties)
    schema: default          # Schema in Delta catalog (Hive Metastore)
    description: >
      Gold layer OHLCV aggregates from silver_to_gold.py (Teammate 1).
      Contains 1-minute and 5-minute candles for Binance USDT pairs.
      Stored in GCS at gs://crypto-lakehouse-group8/gold/ as Delta Lake format.
      Read via Trino catalog 'delta' through Hive Metastore.

    # Freshness: warn if Gold data is stale (Airflow job not running)
    freshness:
      warn_after:  {count: 1, period: hour}
      error_after: {count: 3, period: hour}
    loaded_at_field: candle_time

    tables:
      - name: gold_ohlcv
        description: >
          OHLCV (Open/High/Low/Close/Volume) candles aggregated from Silver ticks.
          Each row = 1 candle for 1 symbol over 1 time window (1-min or 5-min).
          Partitioned by (symbol, candle_date) for Trino partition pruning.

        columns:
          - name: symbol
            description: >
              Binance trading pair, e.g. BTCUSDT, ETHUSDT, BNBUSDT.
              Always UPPERCASE. Only USDT-denominated pairs.
            tests:
              - not_null
              - dbt_utils.not_empty_string

          - name: candle_time
            description: >
              UTC timestamp marking the START of the candle window.
              For 1-min candle: e.g. 10:05:00 means the candle covers 10:05:00 - 10:05:59.
            tests:
              - not_null

          - name: candle_date
            description: >
              DATE extracted from candle_time. Used as partition column in Delta Lake.
              Enables Trino partition pruning when filtering by date.
            tests:
              - not_null

          - name: candle_duration
            description: >
              Duration of the candle as a string: "1 minute" or "5 minutes".
              Set by silver_to_gold.py via F.lit(window_duration).
            tests:
              - not_null
              - accepted_values:
                  values: ["1 minute", "5 minutes"]

          - name: open
            description: "First trade price in the candle window."
            tests:
              - not_null

          - name: high
            description: "Highest trade price in the candle window."
            tests:
              - not_null

          - name: low
            description: "Lowest trade price in the candle window."
            tests:
              - not_null

          - name: close
            description: "Last trade price in the candle window."
            tests:
              - not_null

          - name: volume
            description: >
              Total quantity traded in the candle (in coin units, not USDT).
              E.g. 1.234 BTC were traded in this candle.
            tests:
              - not_null

          - name: tick_count
            description: "Number of individual trades aggregated into this candle."

          - name: ma_7
            description: >
              Moving Average of close price over 7 periods.
              NULL for the first 6 candles of each symbol (not enough history).

          - name: ma_20
            description: >
              Moving Average of close price over 20 periods.
              NULL for the first 19 candles of each symbol.

          - name: ma_50
            description: >
              Moving Average of close price over 50 periods.
              NULL for the first 49 candles of each symbol.

          - name: processing_timestamp
            description: >
              ISO 8601 timestamp of when silver_to_gold.py processed this batch.
              Useful for debugging data freshness and pipeline latency.

  # =============================================================================
  # SOURCE 2: Production GCS data (real 17k+ rows from silver_to_gold.py)
  # Trino catalog: delta_gcs  →  delta_gcs.gcs.gold_ohlcv
  # Data: gs://crypto-lakehouse-group8/gold/ (real Binance trades)
  # Use: .\dbt\scripts\setup_and_test.ps1 -GCS
  #      dbt test --select source:gold_gcs
  # Pre-req: GCS ADC credentials at %APPDATA%\gcloud\
  # =============================================================================
  - name: gold_gcs
    database: delta_gcs        # trino/catalog/delta_gcs.properties
    schema: gcs                # Registered by setup_and_test.ps1 STEP 6b
    description: >
      Production Gold layer from silver_to_gold.py on GCS.
      Contains 17k+ real OHLCV candles from Binance live data.
      Stored at gs://crypto-lakehouse-group8/gold/ as Delta Lake.

    tables:
      - name: gold_ohlcv
        description: >
          Real production OHLCV (same schema as mock table).
          17k+ rows of real Binance 1-min + 5-min candles with MA7/MA20/MA50.

        columns:
          - name: symbol
            description: "Binance trading pair."
            tests:
              - not_null
              - dbt_utils.not_empty_string

          - name: candle_time
            description: "Start timestamp of candle window (UTC)."
            tests: [not_null]

          - name: candle_date
            description: "Partition DATE from candle_time."
            tests: [not_null]

          - name: candle_duration
            description: "'1 minute' or '5 minutes'."
            tests:
              - not_null
              - accepted_values:
                  values: ["1 minute", "5 minutes"]

          - name: open
            tests: [not_null]
          - name: high
            tests: [not_null]
          - name: low
            tests: [not_null]
          - name: close
            tests: [not_null]
          - name: volume
            tests: [not_null]
          - name: tick_count
            description: "Number of trades in candle."
          - name: ma_7
            description: "MA7 — NULL for first 6 candles of each symbol."
          - name: ma_20
            description: "MA20 — NULL for first 19 candles."
          - name: ma_50
            description: "MA50 — NULL for first 49 candles."
          - name: processing_timestamp
            description: "Batch timestamp from silver_to_gold.py."
