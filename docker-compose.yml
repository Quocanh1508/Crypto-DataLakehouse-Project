services:

  # ── Message Broker ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    mem_limit: 512m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lakehouse-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    mem_limit: 1g
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-connect:
    image: confluentinc/cp-kafka-connect-base:7.5.0
    container_name: kafka-connect
    mem_limit: 1g
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:29092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt confluentinc/kafka-connect-http:1.7.3
        /etc/confluent/docker/run
    networks:
      - lakehouse-net

  # ── Metadata Layer (PostgreSQL + Hive Metastore → GCS warehouse) ─────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    mem_limit: 512m
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 10

  hive-metastore:
    build:
      context: ./hive-metastore
    image: local/hive-metastore-gcs:3.1.2-e.18
    container_name: hive-metastore
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      HIVE_METASTORE_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://postgres:5432/metastore
      HIVE_METASTORE_USER: hive
      HIVE_METASTORE_PASSWORD: hivepassword
      HIVE_METASTORE_WAREHOUSE_DIR: ${HIVE_METASTORE_WAREHOUSE_DIR:-gs://crypto-lakehouse-group8/bronze/}
      # Starburst entrypoint requires S3 env vars even when warehouse is gs://; values are unused.
      S3_ENDPOINT: http://127.0.0.1:1
      S3_ACCESS_KEY: unused
      S3_SECRET_KEY: unused
      S3_PATH_STYLE_ACCESS: "true"
      REGION: ${GCP_REGION:-us-east-1}
      GOOGLE_CLOUD_KEY_FILE_PATH: /etc/gcp/sa.json
      AZURE_ADL_CLIENT_ID: ${AZURE_ADL_CLIENT_ID:-disabled}
      AZURE_ADL_CREDENTIAL: ${AZURE_ADL_CREDENTIAL:-disabled}
      AZURE_ADL_REFRESH_URL: ${AZURE_ADL_REFRESH_URL:-disabled}
      AZURE_ABFS_STORAGE_ACCOUNT: ${AZURE_ABFS_STORAGE_ACCOUNT:-disabled}
      AZURE_ABFS_ACCESS_KEY: ${AZURE_ABFS_ACCESS_KEY:-disabled}
      AZURE_WASB_STORAGE_ACCOUNT: ${AZURE_WASB_STORAGE_ACCOUNT:-disabled}
      AZURE_ABFS_OAUTH: ${AZURE_ABFS_OAUTH:-disabled}
      AZURE_ABFS_OAUTH_TOKEN_PROVIDER: ${AZURE_ABFS_OAUTH_TOKEN_PROVIDER:-disabled}
      AZURE_ABFS_OAUTH_CLIENT_ID: ${AZURE_ABFS_OAUTH_CLIENT_ID:-disabled}
      AZURE_ABFS_OAUTH_SECRET: ${AZURE_ABFS_OAUTH_SECRET:-disabled}
      AZURE_ABFS_OAUTH_ENDPOINT: ${AZURE_ABFS_OAUTH_ENDPOINT:-disabled}
      AZURE_WASB_ACCESS_KEY: ${AZURE_WASB_ACCESS_KEY:-disabled}
    volumes:
      - ${GCP_SERVICE_ACCOUNT_KEY:?Set GCP_SERVICE_ACCOUNT_KEY to your service account JSON path}:/etc/gcp/sa.json:ro
    networks:
      - lakehouse-net

  # ── Query Engine (Trino) ──────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:432
    container_name: trino
    mem_limit: 2g
    depends_on:
      - hive-metastore
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ${GCP_SERVICE_ACCOUNT_KEY:?Set GCP_SERVICE_ACCOUNT_KEY to your service account JSON path}:/etc/gcp/sa.json:ro
    networks:
      - lakehouse-net

  # ── Processing Engine (Spark 3.5.8 Custom) ────────────────────────────────────
  spark-master:
    build:
      context: ./spark
    container_name: spark-master
    mem_limit: 1g
    environment:
      - SPARK_ROLE=master
      - GOOGLE_APPLICATION_CREDENTIALS=/home/spark/.config/gcloud/application_default_credentials.json
    volumes:
      - "${APPDATA}/gcloud:/home/spark/.config/gcloud:ro"
      - "./processing:/processing"
    ports:
      - "7077:7077"
      - "8082:8080"
      - "9108:9108"
    networks:
      - lakehouse-net

  spark-worker:
    build:
      context: ./spark
    container_name: spark-worker
    mem_limit: 2g
    depends_on:
      - spark-master
    environment:
      - SPARK_ROLE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1500M
      - SPARK_WORKER_CORES=2
      - GOOGLE_APPLICATION_CREDENTIALS=/home/spark/.config/gcloud/application_default_credentials.json
    volumes:
      - "${APPDATA}/gcloud:/home/spark/.config/gcloud:ro"
      - "./processing:/processing"
    ports:
      - "9109:9108"
    networks:
      - lakehouse-net

  # ── Monitoring ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    mem_limit: 512m
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - lakehouse-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    mem_limit: 512m
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lakehouse-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    mem_limit: 128m
    command:
      - --kafka.server=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge
