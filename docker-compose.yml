services:

  # ── Message Broker ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    mem_limit: 512m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lakehouse-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    mem_limit: 1g
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT  → for internal Docker-to-Docker communication
      # PLAINTEXT_HOST → for host machine (localhost:9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # FIX #3: Kafka Connect now uses a dedicated Dockerfile with the plugin pre-installed.
  # This eliminates the ~10 minute startup delay caused by downloading the plugin at runtime.
  kafka-connect:
    build:
      context: ./kafka-connect
      dockerfile: Dockerfile
    container_name: kafka-connect
    mem_limit: 1g
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:29092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    networks:
      - lakehouse-net

  # ── Ingestion: WebSocket Streaming Producer (24/7) ───────────────────────────
  # Managed by Docker (not Airflow) because it's a long-running process.
  # restart: always ensures it auto-recovers from crashes without human intervention.
  producer-stream:
    image: python:3.10-slim
    container_name: producer-stream
    mem_limit: 256m
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./ingestion:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC_RAW: "crypto_trades_raw"
      KAFKA_TOPIC_DLQ: "crypto_trades_dlq"
      BINANCE_REST_URL: "https://api.binance.com"
      BINANCE_WS_URL: "wss://stream.binance.com:9443/stream"
      TOP_N_COINS: "10"
    command: >
      bash -c "pip install -q kafka-python requests websocket-client rel tenacity &&
               python producer_stream.py"
    networks:
      - lakehouse-net

  # ── Local Object Storage (MinIO - for local dev/testing only) ────────────────
  # Trino's delta.properties uses hive.s3.endpoint=http://minio:9000
  # MinIO provides S3-compatible storage for Trino to create/read Delta tables.
  # In production, data lives in GCS (gs://crypto-lakehouse-group8/).
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Client: auto-create 'gold' bucket on startup
  mc:
    image: minio/mc:latest
    container_name: mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin admin123 &&
      mc mb --ignore-existing myminio/gold &&
      mc mb --ignore-existing myminio/staging &&
      mc mb --ignore-existing myminio/marts &&
      echo 'Buckets created successfully' &&
      exit 0
      "
    networks:
      - lakehouse-net

  # ── Metadata Layer (PostgreSQL + Hive Metastore) ─────────────────────────────
  # FIX #4: init_postgres.sql already provisions TWO separate databases:
  #   - metastore (owner: hive)   → for Hive Metastore
  #   - airflow   (owner: airflow) → for Apache Airflow
  # This prevents any schema collision between the two services.
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    mem_limit: 512m
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 10

  # FIX #1: Hive Metastore now points to GCS (gs://) instead of MinIO (s3a://).
  # GCS auth is handled via the mounted ADC credentials.
  #
  # IMPORTANT: The starburstdata/hive startup script uses `set -e` + `test -v`
  # to verify ALL env vars exist (S3 + GCS). If ANY var is missing, the script
  # exits immediately and the container crash-loops.
  # Solution: set dummy S3 vars so `test -v` passes. Actual storage uses GCS.
  hive-metastore:
    image: starburstdata/hive:3.1.2-e.18
    container_name: hive-metastore
    mem_limit: 1g
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      HIVE_METASTORE_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://postgres:5432/metastore
      HIVE_METASTORE_USER: hive
      HIVE_METASTORE_PASSWORD: hivepassword
      # Local dev: warehouse on MinIO. Production: gs://crypto-lakehouse-group8/
      HIVE_METASTORE_WAREHOUSE_DIR: "s3a://gold/"
      # --- S3 vars pointing to local MinIO (for dev/testing) ---
      # Trino's delta.properties uses same credentials: admin / admin123
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "admin"
      S3_SECRET_KEY: "admin123"
      S3_PATH_STYLE_ACCESS: "true"
      REGION: "us-east-1"
      # --- GCS credentials (actual storage) ---
      GOOGLE_CLOUD_KEY_FILE_PATH: /home/hive/.config/gcloud/application_default_credentials.json
      # --- Azure dummy vars (ALL required by startup script's `test -v` checks) ---
      # Not used. GCS is the real storage. Full list from /opt/bin/start-hive-metastore.sh
      AZURE_ADL_CLIENT_ID: "unused"
      AZURE_ADL_CREDENTIAL: "unused"
      AZURE_ADL_REFRESH_URL: "https://unused"
      AZURE_ABFS_STORAGE_ACCOUNT: "unused"
      AZURE_ABFS_ACCESS_KEY: "unused"
      AZURE_WASB_STORAGE_ACCOUNT: "unused"
      AZURE_ABFS_OAUTH: "false"
      AZURE_ABFS_OAUTH_TOKEN_PROVIDER: "unused"
      AZURE_ABFS_OAUTH_CLIENT_ID: "unused"
      AZURE_ABFS_OAUTH_SECRET: "unused"
      AZURE_ABFS_OAUTH_ENDPOINT: "https://unused"
      AZURE_WASB_ACCESS_KEY: "unused"
    volumes:
      - "${APPDATA}/gcloud:/home/hive/.config/gcloud:ro"
    networks:
      - lakehouse-net

  # ── Query Engine (Trino) ──────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:432
    container_name: trino
    mem_limit: 2g
    depends_on:
      - hive-metastore
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse-net

  # ── Processing Engine (Spark 3.5.8 Custom) ────────────────────────────────────
  # FIX #2: Reduced mem_limit from 4g → 1g for Master (coordinator only).
  # The Master doesn't process data — it only schedules tasks to Workers.
  spark-master:
    build:
      context: ./spark
    container_name: spark-master
    mem_limit: 3g
    environment:
      - SPARK_ROLE=master
      - GOOGLE_APPLICATION_CREDENTIALS=/home/spark/.config/gcloud/application_default_credentials.json
    volumes:
      - "${APPDATA}/gcloud:/home/spark/.config/gcloud:ro"
      - "./processing:/processing"
    ports:
      - "7077:7077"
      - "8082:8080"   # Spark Web UI (8080 is taken by Trino)
    networks:
      - lakehouse-net

  # FIX #2: Reduced mem_limit from 4g → 2g for Worker.
  # SPARK_WORKER_MEMORY set to 1500M so the container OS still has headroom.
  spark-worker:
    build:
      context: ./spark
    container_name: spark-worker
    mem_limit: 2g
    depends_on:
      - spark-master
    environment:
      - SPARK_ROLE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1500M
      - SPARK_WORKER_CORES=2
      - GOOGLE_APPLICATION_CREDENTIALS=/home/spark/.config/gcloud/application_default_credentials.json
    volumes:
      - "${APPDATA}/gcloud:/home/spark/.config/gcloud:ro"
      - "./processing:/processing"
    networks:
      - lakehouse-net

  # ── Workflow Orchestration (Airflow) ──────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.10
    container_name: airflow-webserver
    mem_limit: 1g
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8888:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # FIX #4: Airflow explicitly uses its own 'airflow' database, isolated from 'metastore'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__RBAC: "true"
      AIRFLOW_HOME: /home/airflow
    volumes:
      - ./dags:/home/airflow/dags
      - ./airflow_logs:/home/airflow/logs
      - ./processing:/home/airflow/processing
      - "${APPDATA}/gcloud:/home/airflow/.config/gcloud:ro"
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true && airflow webserver"
    networks:
      - lakehouse-net

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.10
    container_name: airflow-scheduler
    mem_limit: 1g
    depends_on:
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_started
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW_HOME: /home/airflow
    volumes:
      - ./dags:/home/airflow/dags
      - ./airflow_logs:/home/airflow/logs
      - ./processing:/home/airflow/processing
      - "${APPDATA}/gcloud:/home/airflow/.config/gcloud:ro"
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio_data:
    driver: local