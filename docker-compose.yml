services:

  # ── Message Broker ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    mem_limit: 512m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lakehouse-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    mem_limit: 1g
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT  → for internal Docker-to-Docker communication
      # PLAINTEXT_HOST → for host machine (localhost:9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-connect:
    image: confluentinc/cp-kafka-connect-base:7.5.0
    container_name: kafka-connect
    mem_limit: 1g
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:29092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    command:
      - bash
      - -c
      - |
        confluent-hub install --no-prompt confluentinc/kafka-connect-http:1.7.3
        /etc/confluent/docker/run
    networks:
      - lakehouse-net

  # ── Object Storage (MinIO) ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    mem_limit: 512m
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: admin          # use ROOT_USER (MINIO_ACCESS_KEY is deprecated)
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # mc: one-shot container to create buckets after MinIO is ready
  mc:
    image: minio/mc:latest
    container_name: mc
    mem_limit: 128m
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin admin123;
      /usr/bin/mc mb --ignore-existing myminio/bronze;
      /usr/bin/mc mb --ignore-existing myminio/silver;
      /usr/bin/mc mb --ignore-existing myminio/gold;
      /usr/bin/mc mb --ignore-existing myminio/checkpoints;
      /usr/bin/mc mb --ignore-existing myminio/raw-batch;
      echo '✅ All 5 buckets created.';
      exit 0;
      "
    networks:
      - lakehouse-net

  # ── Metadata Layer (PostgreSQL + Hive Metastore) ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    mem_limit: 512m
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 10

  hive-metastore:
    image: starburstdata/hive:3.1.2-e.18   # well-tested image for Trino + Delta Lake
    container_name: hive-metastore
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      HIVE_METASTORE_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://postgres:5432/metastore
      HIVE_METASTORE_USER: hive
      HIVE_METASTORE_PASSWORD: hivepassword
      HIVE_METASTORE_WAREHOUSE_DIR: s3a://bronze/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin123
      S3_PATH_STYLE_ACCESS: "true"
      REGION: us-east-1
      GOOGLE_CLOUD_KEY_FILE_PATH: ""
    networks:
      - lakehouse-net

  # ── Query Engine (Trino) ──────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:432
    container_name: trino
    mem_limit: 2g
    depends_on:
      - hive-metastore
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse-net

  # ── Processing Engine (Spark 3.5.8 Custom) ────────────────────────────────────
  spark-master:
    build:
      context: ./spark
    container_name: spark-master
    mem_limit: 1g
    environment:
      - SPARK_ROLE=master
      - GOOGLE_APPLICATION_CREDENTIALS=/home/spark/.config/gcloud/application_default_credentials.json
    volumes:
      - "${APPDATA}/gcloud:/home/spark/.config/gcloud:ro"
    ports:
      - "7077:7077"
      - "8082:8080"   # Spark Web UI (8080 is taken by Trino)
    networks:
      - lakehouse-net

  spark-worker:
    build:
      context: ./spark
    container_name: spark-worker
    mem_limit: 2g
    depends_on:
      - spark-master
    environment:
      - SPARK_ROLE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=1500M
      - SPARK_WORKER_CORES=2
      - GOOGLE_APPLICATION_CREDENTIALS=/home/spark/.config/gcloud/application_default_credentials.json
    volumes:
      - "${APPDATA}/gcloud:/home/spark/.config/gcloud:ro"
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge