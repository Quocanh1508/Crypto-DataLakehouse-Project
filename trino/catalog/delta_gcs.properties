# =============================================================================
# delta_gcs.properties
# =============================================================================
# Trino catalog pointing to GCS (production Gold layer).
#
# Data:   gs://crypto-lakehouse-group8/gold/
# Access: GCS Application Default Credentials (ADC) mounted from host
#
# Usage in dbt:
#   database: delta_gcs     <- this catalog name
#   schema:   default
# =============================================================================

connector.name=delta_lake
hive.metastore.uri=thrift://hive-metastore:9083

# GCS filesystem (instead of S3/MinIO)
hive.gcs.use-access-token=false
hive.gcs.json-key-file-path=/home/trino/.config/gcloud/application_default_credentials.json

# Delta Lake settings
delta.enable-non-concurrent-writes=true
delta.legacy-create-table-with-existing-location.enabled=true
# Enable CALL system.register_table() for existing GCS Delta tables
delta.register-table-procedure.enabled=true
